services:
  miniagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniagent
    ports:
      - "3333:3333"
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./db:/app/db
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-redirect", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s